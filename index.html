<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICU カルテ記載支援</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Yu Gothic UI','Meiryo',sans-serif; background:#f0f2f5; color:#1a1a2e; }

  .header { background:#1b4965; color:#fff; padding:12px 20px; display:flex; align-items:center; gap:10px; }
  .header h1 { font-size:16px; }
  .header small { font-size:10px; opacity:.7; }

  .tabs { display:flex; background:#fff; border-bottom:2px solid #ddd; }
  .tabs button { flex:1; padding:10px; border:none; background:none; font-family:inherit; font-size:13px; font-weight:bold; color:#888; cursor:pointer; border-bottom:3px solid transparent; }
  .tabs button:hover { background:#eef3f8; }
  .tabs button.active { color:#1b4965; border-bottom-color:#1b4965; background:#eef3f8; }

  .content { max-width:860px; margin:0 auto; padding:16px; }
  .panel { display:none; }
  .panel.active { display:block; }

  .card { background:#fff; border-radius:6px; padding:14px; margin-bottom:12px; border:1px solid #e0e0e0; }
  .card h3 { font-size:13px; color:#1b4965; margin-bottom:6px; }
  .card .hint { font-size:11px; color:#888; margin-bottom:8px; line-height:1.6; }

  /* ペースト欄 = contenteditable div */
  .paste-area {
    width:100%; min-height:200px; padding:10px;
    font-family:Consolas,'MS Gothic',monospace; font-size:13px; line-height:1.6;
    border:2px solid #ccc; border-radius:4px; background:#fff; color:#000;
    overflow-y:auto; max-height:400px;
    outline:none;
  }
  .paste-area:focus { border-color:#2e86ab; background:#fffff8; }
  .paste-area:empty::before {
    content:attr(data-placeholder);
    color:#aaa; pointer-events:none;
  }

  textarea {
    display:block; width:100%; min-height:60px; padding:10px;
    font-family:Consolas,'MS Gothic',monospace; font-size:13px; line-height:1.6;
    border:2px solid #ccc; border-radius:4px; background:#fff; color:#000; resize:vertical;
  }
  textarea:focus { outline:none; border-color:#2e86ab; background:#fffff8; }

  input[type="text"],select { padding:6px 8px; font-family:inherit; font-size:13px; border:1px solid #ccc; border-radius:4px; }
  input[type="text"]:focus,select:focus { outline:none; border-color:#2e86ab; }

  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:6px; }
  .row label { font-size:13px; font-weight:bold; }

  .btn { font-family:inherit; font-size:13px; font-weight:bold; padding:8px 16px; border:none; border-radius:4px; cursor:pointer; }
  .btn-blue { background:#1b4965; color:#fff; }
  .btn-blue:hover { background:#163d55; }
  .btn-green { background:#1a936f; color:#fff; font-size:14px; padding:10px 24px; }
  .btn-green:hover { background:#157a5c; }
  .btn-orange { background:#d4760a; color:#fff; }
  .btn-orange:hover { background:#b56400; }

  .paste-btns { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }

  .result { margin-top:8px; padding:6px 10px; border-radius:4px; font-size:12px; display:none; }
  .result.ok { background:#e8f5ef; color:#1a936f; display:block; }
  .result.err { background:#fee; color:#c00; display:block; }

  .sec-block { border:1px solid #e0e0e0; border-radius:6px; margin-bottom:6px; overflow:hidden; }
  .sec-title { padding:8px 12px; background:#eef3f8; font-size:13px; font-weight:bold; color:#1b4965; cursor:pointer; display:flex; justify-content:space-between; border-bottom:1px solid #ddd; }
  .sec-title:hover { background:#dde8f2; }
  .sec-content { padding:8px; }

  .preview { background:#fff; border:1px solid #ccc; border-radius:6px; padding:16px; white-space:pre-wrap; word-break:break-all; font-family:Consolas,'MS Gothic',monospace; font-size:13px; line-height:1.8; min-height:400px; }
  .toolbar { display:flex; justify-content:flex-end; align-items:center; gap:10px; margin-bottom:10px; }
  .copymsg { font-size:13px; font-weight:bold; color:#1a936f; display:none; }

  .diag { background:#fffbe6; border:1px solid #e0d890; border-radius:6px; padding:12px; margin-bottom:12px; }
  .diag h3 { color:#997a00; font-size:13px; }
  .diag-log { font-family:Consolas,monospace; font-size:11px; background:#fff; border:1px solid #ddd; padding:8px; margin-top:6px; min-height:40px; max-height:150px; overflow-y:auto; white-space:pre-wrap; color:#333; }
</style>
</head>
<body>

<script>
/* ======== ログ ======== */
function log(msg){
  var el=document.getElementById("diagLog");
  var d=new Date();
  var ts=d.getHours()+":"+String(d.getMinutes()).padStart(2,"0")+":"+String(d.getSeconds()).padStart(2,"0");
  el.textContent+="\n["+ts+"] "+msg;
  el.scrollTop=el.scrollHeight;
}

/* ======== contenteditable からテキスト抽出 ======== */
function getTextFromArea(id){
  var el=document.getElementById(id);
  // テーブルがペーストされた場合の特別処理
  var tables=el.querySelectorAll("table");
  if(tables.length>0){
    log(id+": テーブル要素検出("+tables.length+"個) → テーブルからテキスト抽出");
    var lines=[];
    for(var t=0;t<tables.length;t++){
      var rows=tables[t].querySelectorAll("tr");
      for(var r=0;r<rows.length;r++){
        var cells=rows[r].querySelectorAll("td,th");
        var vals=[];
        for(var c=0;c<cells.length;c++) vals.push(cells[c].textContent.trim());
        lines.push(vals.join("\t"));
      }
    }
    return lines.join("\n");
  }
  // テーブルがなければ textContent を使用
  // ただし innerText のほうが改行を保持する
  var text=el.innerText||el.textContent||"";
  return text;
}

function clearArea(id){
  document.getElementById(id).innerHTML="";
}

/* ======== ペーストイベント ======== */
function setupPaste(id){
  var el=document.getElementById(id);
  el.addEventListener("paste",function(e){
    var cd=e.clipboardData||window.clipboardData;
    if(!cd){log(id+": clipboardData なし");return;}
    var types=[];
    for(var i=0;i<cd.types.length;i++) types.push(cd.types[i]);
    log(id+" paste: types=["+types.join(", ")+"]");

    var plain=cd.getData("text/plain");
    var html=cd.getData("text/html");
    log("  text/plain: "+(plain?plain.length+"文字":"なし/0文字"));
    log("  text/html: "+(html?html.length+"文字":"なし/0文字"));

    if(html){
      // HTMLがある場合、ブラウザのデフォルトペースト（リッチ）を使う
      // → そのまま contenteditable に HTML が挿入される
      log("  → HTML ペースト（ブラウザデフォルト）を許可");
      // デフォルト動作に任せるのでpreventDefaultしない
      return;
    }

    if(plain){
      // プレーンテキストのみの場合
      e.preventDefault();
      document.execCommand("insertText",false,plain);
      log("  → プレーンテキスト挿入");
      return;
    }

    // どちらもない場合 → クリップボードに特殊形式のみ
    log("  → text/plain も text/html もなし。特殊形式のみの可能性");
  });
}
setupPaste("bloodInput");
setupPaste("bgaInput");

/* ======== Clipboard API (read) - 全形式取得 ======== */
function clipRead(targetId){
  var el=document.getElementById(targetId);

  // まず read() で全形式を試す
  if(navigator.clipboard&&navigator.clipboard.read){
    navigator.clipboard.read().then(function(items){
      log("clipboard.read(): "+items.length+" item(s)");
      for(var i=0;i<items.length;i++){
        log("  item["+i+"] types: "+items[i].types.join(", "));

        // text/html を優先
        if(items[i].types.indexOf("text/html")!==-1){
          items[i].getType("text/html").then(function(blob){
            return blob.text();
          }).then(function(html){
            log("  text/html 取得: "+html.length+"文字");
            el.innerHTML=html;
          });
          return;
        }

        // text/plain
        if(items[i].types.indexOf("text/plain")!==-1){
          items[i].getType("text/plain").then(function(blob){
            return blob.text();
          }).then(function(text){
            log("  text/plain 取得: "+text.length+"文字");
            el.textContent=text;
          });
          return;
        }
      }
      log("  対応形式なし");
    }).catch(function(err){
      log("clipboard.read() 失敗: "+err.message);
      // フォールバック: readText()
      fallbackReadText(targetId);
    });
  } else {
    fallbackReadText(targetId);
  }
}

function fallbackReadText(targetId){
  if(navigator.clipboard&&navigator.clipboard.readText){
    navigator.clipboard.readText().then(function(text){
      log("readText(): "+text.length+"文字");
      if(text.length>0) document.getElementById(targetId).textContent=text;
      else log("  テキストが空。電子カルテがHTMLのみでコピーしている可能性");
    }).catch(function(err){
      log("readText() 失敗: "+err.message);
    });
  }
}

/* ======== データ定義 ======== */
var SECTIONS=[
  {id:"problem",title:"Problem/診断"},{id:"conference",title:"カンファレンス"},
  {id:"event",title:"イベント"},{id:"consciousness",title:"意識"},

  {id:"balance",title:"バランス"},{id:"renal",title:"腎・電解質"},
  {id:"gi",title:"消化器・栄養"},{id:"blood",title:"血液・凝固"},
  {id:"infection",title:"感染・抗菌薬"}
];
var T={};
T.problem="# ARDS\n# ERCP 後膵炎\n# 肺炎\n\n# 膵頭部癌\n# 関節リウマチ\n# 間質性肺炎\n# 高血圧";
T.conference=""; T.event="";
T.consciousness="プレセデックス  mcg/kg/h\nプロポフォール  mg/h（夜間は mg/h）\nレミフェンタニル  γ\nRASS \nCPOT ";
T.respiratory="経口挿管\n呼吸器：PCV/PC /PEEP /FiO2 /f /Tv   mL前後\n喀痰：\nCXR：\nエコー：\n胸腔ドレーン：  mL";
T.circulation="HR   -\nABP   /\nビソノテープ  mg\nオノアクト  γ\nlactate ";
T.balance="6-14時   mL\nBW  kg（入院時+ kg）";
T.renal="UOP 6-14時  mL\n内服：フロセミド  mg/2x ＋ アルダクトン  mg/2x\n静注：フロセミド  mg iv x";
T.gi="EN：クリミール 250-250-250mL\nNG：  mL\n便：";
T.blood="ヘパリン  単位/day";
T.infection="長期間高用量のPSLに対してPCP予防でサムチレール 1500mg/1x\n\n 喀痰：\n\n抗菌薬を投与するならMINOか...";

var parsedBlood={},parsedBGA=null;
var RENAL=[{l:"Na",k:["Na"]},{l:"K",k:["K"]},{l:"Cl",k:["Cl"]},{l:"Ca",k:["Ca"]},{l:"iP",k:["iP","IP"]},{l:"Mg",k:["Mg"]},{l:"UN",k:["UN","BUN"]},{l:"Cr",k:["Cr","CRE"]}];
var BLOOD=[{l:"WBC",k:["WBC"]},{l:"Hb",k:["Hb","HB"]},{l:"PLT",k:["PLT","Plt"]},{l:"PT-INR",k:["PT-INR","PTINR"]},{l:"APTT",k:["APTT"]},{l:"Fib",k:["Fib","FIB"]},{l:"FDP(B)",k:["FDP(B)","FDP"]},{l:"Dダイマー",k:["Dダイマー","Dダイマ-","D-dimer"]},{l:"AT",k:["AT","ATIII"]}];
var INFECT=[{l:"CRP",k:["CRP"]},{l:"WBC",k:["WBC"]}];

/* ======== タブ ======== */
function showTab(name,btn){
  var ps=document.querySelectorAll(".panel"),ts=document.querySelectorAll(".tabs button");
  for(var i=0;i<ps.length;i++)ps[i].classList.remove("active");
  for(var i=0;i<ts.length;i++)ts[i].classList.remove("active");
  document.getElementById("panel-"+name).classList.add("active");
  btn.classList.add("active");
  if(name==="preview")renderPreview();
  if(name==="template")buildEditors();
}

/* ======== 勤務帯 ======== */
function updateShift(){
  var s=document.getElementById("shiftType").value;
  document.getElementById("shiftInfo").textContent="→ 申し送り先：【"+((s==="日勤")?"夜勤":"日勤")+"への申し送り】";
}
updateShift();

/* ======== 血液検査パース ======== */
function doParseBlood(){
  var text=getTextFromArea("bloodInput");
  log("血液検査テキスト取得: "+text.length+"文字");
  if(!text||!text.trim()){alert("血液検査結果を先に貼り付けてください。");return;}

  parsedBlood={};
  var lines=text.split("\n");
  for(var i=0;i<lines.length;i++){
    var c=lines[i].replace(/\t/g," ").replace(/\s+/g," ").trim();
    if(!c)continue;
    var m=c.match(/^(.+?)\s+([\d.]+[HLhl]?)\s*([\d.]+[HLhl]?)?$/);
    if(m) parsedBlood[m[1].trim()]=[m[2],m[3]||""];
  }
  var keys=Object.keys(parsedBlood);
  var el=document.getElementById("bloodResult");
  if(keys.length>0){el.className="result ok";el.textContent="✅ "+keys.length+" 項目検出："+keys.join(", ");}
  else{el.className="result err";el.textContent="⚠️ 項目を検出できませんでした。テキスト内容:\n"+text.substring(0,200);}
  log("血液検査解析: "+keys.length+"項目");
}

/* ======== BGAパース ======== */
function doParseBGA(){
  var text=getTextFromArea("bgaInput");
  log("BGAテキスト取得: "+text.length+"文字");
  if(!text||!text.trim()){alert("BGA結果を先に貼り付けてください。");return;}

  var lines=text.split("\n"),clean=[];
  for(var i=0;i<lines.length;i++) if(lines[i].trim()) clean.push(lines[i]);

  var colHeaders=[],dateCols=[],timeRow=null,dataStart=0;
  for(var i=0;i<Math.min(clean.length,5);i++){
    var parts=clean[i].split("\t");
    var hasDates=false,hasTimes=false;
    for(var j=0;j<parts.length;j++){
      if(/\d{2}\/\d{2}/.test(parts[j].trim()))hasDates=true;
      if(/^\d{1,2}:\d{2}$/.test(parts[j].trim()))hasTimes=true;
    }
    if(hasDates&&!hasTimes){
      for(var j=0;j<parts.length;j++) if(/\d{2}\/\d{2}/.test(parts[j].trim())) dateCols.push({date:parts[j].trim(),col:j});
      dataStart=i+1;
    }else if(hasTimes){timeRow=parts;dataStart=i+1;}
    else if(/^(血ガス|血液ガス)/.test(parts[0].trim())&&parts.length<=3) dataStart=i+1;
  }
  if(timeRow){
    var curDate=dateCols.length>0?dateCols[0].date:"",dcIdx=0;
    for(var j=0;j<timeRow.length;j++){
      var v=timeRow[j].trim();
      if(/^\d{1,2}:\d{2}$/.test(v)){
        while(dcIdx+1<dateCols.length&&j>=dateCols[dcIdx+1].col){dcIdx++;curDate=dateCols[dcIdx].date;}
        colHeaders.push(curDate+" "+v);
      }
    }
  }
  var data=[];
  for(var i=dataStart;i<clean.length;i++){
    var parts=clean[i].split("\t"),name=parts[0].trim();
    if(!name||/^(血ガス|血液ガス)$/.test(name))continue;
    var vals=[];
    for(var j=1;j<parts.length;j++) if(parts[j].trim()) vals.push(parts[j].trim());
    if(vals.length>0) data.push({name:name,values:vals});
  }
  parsedBGA={columns:colHeaders,data:data};
  var el=document.getElementById("bgaResult");
  if(data.length>0){el.className="result ok";el.textContent="✅ "+data.length+" 項目 × "+colHeaders.length+" 時点";}
  else{el.className="result err";el.textContent="⚠️ データを検出できませんでした。テキスト内容:\n"+text.substring(0,200);}
  log("BGA解析: "+data.length+"項目, "+colHeaders.length+"時点");
}

/* ======== テンプレート ======== */
var editorsReady=false;
function buildEditors(){
  if(editorsReady){syncT();return;}
  editorsReady=true;
  var box=document.getElementById("editors");box.innerHTML="";
  for(var i=0;i<SECTIONS.length;i++){
    var s=SECTIONS[i];
    var div=document.createElement("div");div.className="sec-block";
    var title=document.createElement("div");title.className="sec-title";
    title.innerHTML="<span>【"+s.title+"】</span><span class='arr'>▼</span>";
    var body=document.createElement("div");body.className="sec-content";
    var ta=document.createElement("textarea");ta.id="t-"+s.id;ta.rows=4;ta.value=T[s.id];
    (function(id){
      ta.oninput=function(){T[id]=this.value;};
      title.onclick=function(){var o=body.style.display!=="none";body.style.display=o?"none":"block";title.querySelector(".arr").textContent=o?"▶":"▼";};
    })(s.id);
    body.appendChild(ta);div.appendChild(title);div.appendChild(body);box.appendChild(div);
  }
}
function syncT(){for(var i=0;i<SECTIONS.length;i++){var ta=document.getElementById("t-"+SECTIONS[i].id);if(ta)T[SECTIONS[i].id]=ta.value;}}

/* ======== ヘルパー ======== */
function norm(s){return s.replace(/[\s\-()（）]/g,"").toLowerCase();}
function findV(keys){
  for(var i=0;i<keys.length;i++) if(parsedBlood[keys[i]]) return parsedBlood[keys[i]];
  var rks=Object.keys(parsedBlood);
  for(var i=0;i<keys.length;i++){var nk=norm(keys[i]);for(var j=0;j<rks.length;j++) if(norm(rks[j])===nk) return parsedBlood[rks[j]];}
  return null;
}
function padR(s,n){while(s.length<n)s+=" ";return s;}
function labBlock(items,p){
  var d1=document.getElementById("date1").value,d2=document.getElementById("date2").value;
  var lines=[padR("",p)+" "+d1+"    "+d2];
  for(var i=0;i<items.length;i++){var v=findV(items[i].k);var lbl=padR(items[i].l,p);lines.push(v?lbl+" "+v[0]+(v[1]?"    "+v[1]:""):lbl);}
  return lines.join("\n");
}
function bgaBlockText(){
  if(!parsedBGA||!parsedBGA.data.length)return"";
  var p=16,hdr=padR("",p);
  for(var i=0;i<parsedBGA.columns.length;i++){var c=parsedBGA.columns[i];while(c.length<12)c=" "+c;hdr+=c;}
  var lines=[hdr];
  for(var i=0;i<parsedBGA.data.length;i++){var row=parsedBGA.data[i];var line=padR(row.name,p);for(var j=0;j<row.values.length;j++){var v=row.values[j];while(v.length<12)v=" "+v;line+=v;}lines.push(line);}
  return lines.join("\n");
}

/* ======== カルテ生成 ======== */
function makeKarte(){
  syncT();
  var date=document.getElementById("karteDate").value,shift=document.getElementById("shiftType").value;
  var target=(shift==="日勤")?"夜勤":"日勤",hasLab=Object.keys(parsedBlood).length>0;
  var o=[];
  o.push(date+" "+shift);o.push("");o.push("【"+target+"への申し送り】");o.push("──────────────────────");o.push("");
  for(var i=0;i<SECTIONS.length;i++){
    var s=SECTIONS[i];o.push("【"+s.title+"】");
    if(s.id==="respiratory"){o.push(T[s.id]);var bg=bgaBlockText();if(bg){o.push("");o.push("BGA：");o.push(bg);}}
    else if(s.id==="renal"){o.push(T[s.id]);if(hasLab){o.push("");o.push(labBlock(RENAL,6));}}
    else if(s.id==="blood"){o.push(T[s.id]);if(hasLab){o.push("");o.push(labBlock(BLOOD,10));}}
    else if(s.id==="infection"){var ps=T[s.id].split("\n");o.push(ps[0]||"");if(hasLab){o.push("");o.push(labBlock(INFECT,6));}if(ps.length>1){o.push("");o.push(ps.slice(1).join("\n"));}}
    else o.push(T[s.id]);
    o.push("");
  }
  return o.join("\n");
}

/* ======== プレビュー・コピー ======== */
function renderPreview(){document.getElementById("previewBox").textContent=makeKarte();}
function doCopy(){
  var text=makeKarte();
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){flashMsg("✅ コピーしました");});
  }else{
    var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";
    document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    flashMsg("✅ コピーしました");
  }
}
function flashMsg(msg){var el=document.getElementById("copyMsg");el.textContent=msg;el.style.display="inline";setTimeout(function(){el.style.display="none";},2000);}

log("ページ読み込み完了");
